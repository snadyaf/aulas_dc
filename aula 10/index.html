<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
        }
        
        .container {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .botoes {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }
        
        .consultar {
            background: #2ecc71;
            color: white;
        }
        
        .limpar {
            background: #e74c3c;
            color: white;
        }
        
        button:hover {
            opacity: 0.8;
        }
        
        .resultado {
            margin-top: 20px;
            min-height: 80px;
            padding: 15px;
            border-radius: 8px;
            background: #f8f8f8;
            border: 1px solid #ddd;
            color: #0c0c0c;
        }
        </style>
</head>

<body>
    
    <div class="container">
        
        <h2>Consulta</h2>
        
        <input type="number" id="cep" placeholder="Digite um cep">
        
        <div class="botoes">
            <button class="consultar" id="btnConsultar">
                Consultar
            </button>
            
            <button class="limpar" id="btnLimpar">
                Limpar
            </button>
        </div>
        
        <div class="resultado" id="resultado"></div>
    </div>
    
    
    
    <script src="api.js"></script>
    
</body>

</html>
